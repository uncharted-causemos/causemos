---
include:
  - ./docker-compose-elasticsearch.yaml

services:
  postgres:
    image: ghcr.io/unchartedsoftware/uncharted-shipyard/uncharted-postgres:16.3-alpine
    restart: always
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready', '-d', 'causemos']
      interval: '3s'
      timeout: '3s'
      retries: 30
    user: postgres
    environment:
      POSTGRES_USER: 'postgres'
      POSTGRES_PASSWORD: 'postgres'
      POSTGRES_DB: 'causemos'
    ports:
      - '5432:5432'
    volumes:
      - causemos-db:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  minio:
    image: ghcr.io/unchartedsoftware/uncharted-shipyard/uncharted-minio:release.2024-05-28t17-19-04z
    command: ['server', '/data', '--console-address', ':9090']
    healthcheck:
      test: timeout 5s bash -c ':> /dev/tcp/127.0.0.1/9000' || exit 1
      interval: '3s'
      timeout: '3s'
      retries: 30
    ports:
      - '9000:9000'
      - '9090:9090'
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: admin123
    volumes:
      - causemos-minio:/data

  redis:
    image: ghcr.io/unchartedsoftware/uncharted-shipyard/uncharted-redis:7.2.5-alpine
    restart: always
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: '3s'
      timeout: '3s'
      retries: 30
    ports:
      - '6379:6379'

volumes:
  causemos-db:
    driver: local
  causemos-minio:
    driver: local
