---
include:
  - ./docker-compose-causemos.yaml

services:
  keycloak:
    container_name: keycloak
    image: docker.uncharted.software/it-ops/uncharted_keycloak:26.3.2-1
    restart: always
    healthcheck:
      # Keycloak no longer has curl, https://stackoverflow.com/questions/58168955/testing-minimal-docker-containers-with-healthcheck/76790330#76790330
      test:
        [
          'CMD-SHELL',
          "exec 3<>/dev/tcp/127.0.0.1/8081;echo -e \"GET /health/ready HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n\" >&3;grep \"HTTP/1.1 200 OK\" <&3",
        ]
      interval: '5s'
      timeout: '3s'
      retries: 30
    command: ['start-dev', '--http-port=8081']
    environment:
      KC_DB: 'postgres'
      KC_DB_URL_HOST: 'postgres'
      KC_DB_URL_PORT: '5432'
      KC_DB_URL_DATABASE: 'keycloak'
      KC_DB_USERNAME: 'postgres'
      KC_DB_PASSWORD: 'postgres'
      PROXY_ADDRESS_FORWARDING: 'true'
      KC_BOOTSTRAP_ADMIN_USERNAME: 'admin'
      KC_BOOTSTRAP_ADMIN_PASSWORD: 'admin123'
      KC_HOSTNAME: 'keycloak'
      KC_HOSTNAME_PORT: '8081'
      KC_HOSTNAME_ADMIN_URL: 'http://keycloak:8081'
      KC_HTTP_ENABLED: 'true'
      KC_HOSTNAME_STRICT: 'false'
      KC_HOSTNAME_STRICT_HTTPS: 'false'
    depends_on:
      keycloak_init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      keycloak_themes:
        condition: service_completed_successfully
    volumes:
      - ./keycloak/realm/:/data/
      - keycloak-themes:/opt/keycloak/themes
    ports:
      - '8081:8081'

  keycloak_init:
    image: docker.uncharted.software/it-ops/uncharted_keycloak:26.3.2-1
    command: ['import', '--dir', '/data', '--override', 'false']
    volumes:
      - ./keycloak/realm:/data
    environment:
      KC_DB: 'postgres'
      KC_DB_URL_HOST: 'postgres'
      KC_DB_URL_PORT: '5432'
      KC_DB_URL_DATABASE: 'keycloak'
      KC_DB_USERNAME: 'postgres'
      KC_DB_PASSWORD: 'postgres'
      KC_BOOTSTRAP_ADMIN_USERNAME: 'admin'
      KC_BOOTSTRAP_ADMIN_PASSWORD: 'admin123'
    depends_on:
      postgres:
        condition: service_healthy

  keycloak_themes:
    image: docker.uncharted.software/it-ops/uncharted_keycloak_themes:latest
    command: ['sh', '-c', 'cp -r /data-themes/* /keycloak-themes/']
    volumes:
      - keycloak-themes:/keycloak-themes

volumes:
  keycloak-themes:
    driver: local
